name: Build & Deploy EAden

# Push to the default branch -> build your modified images -> push to ghcr.io -> deploy.
on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

# Never let two deploys race each other.
concurrency:
  group: eaden-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: play
            dockerfile: play/Dockerfile
          - name: back
            dockerfile: back/Dockerfile
          - name: map-storage
            dockerfile: map-storage/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/ssolal/eaden-${{ matrix.name }}:latest
            ghcr.io/ssolal/eaden-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on the server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            cd ~/eaden
            ./deploy/deploy.sh ${{ github.sha }}
